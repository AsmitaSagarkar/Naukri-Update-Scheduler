name: Naukri Auto Update

on:
  workflow_dispatch:
  schedule:
    - cron: "30 3,8 * * *" # 09:00 and 14:00 IST (UTC+5:30)

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt

      - name: Install Chrome
        run: |
          sudo apt update
          sudo apt install -y chromium-browser

      - name: Run Script
        run: python naukri.py

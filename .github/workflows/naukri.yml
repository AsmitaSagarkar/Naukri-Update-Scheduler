name: Naukri Auto Update

permissions:
  contents: read
  issues: write

on:
  workflow_dispatch:
  schedule:
    - cron: "30 3,8 * * *" # 09:00 and 14:00 IST (UTC+5:30)

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt

      - name: Install Chrome
        run: |
          sudo apt update
          sudo apt install -y chromium-browser

      - name: Run Script
        env:
          RESUME_DATE_WISE: "true"
        run: python naukri.py

      - name: Post GitHub notification
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const label = 'naukri-auto-update-status';
            const status = '${{ job.status }}';
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = [
              `@${owner}`,
              '',
              `Workflow: ${context.workflow}`,
              `Status: ${status}`,
              `Branch: ${context.ref.replace('refs/heads/', '')}`,
              `Run: ${runUrl}`
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: label,
              per_page: 1
            });

            if (issues.length === 0) {
              await github.rest.issues.create({
                owner,
                repo,
                title: 'Naukri Auto Update Notifications',
                body: `This issue is used for workflow notifications.\n\n${body}`,
                labels: [label]
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issues[0].number,
                body
              });
            }
